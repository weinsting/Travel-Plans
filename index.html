<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行計畫 (Travel Plans) — TY &amp; W 精心策劃的旅程</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">旅行計畫（Travel Plans）</h1>
      <p class="hero-subtitle">由 TY &amp; W 精心策劃的旅程</p>
    </div>
  </header>

  <section class="intro">
    <p>
      以風景、在地文化、慢旅行與難忘的美食體驗為核心，
      用心設計每一段旅程。
    </p>
  </section>

  <section class="journeys">
    <h2 class="section-label">現正進行與即將展開的旅程</h2>

    <div class="journeys-grid">

      <a href="trips/tohoku-2026/" class="card card--featured">
        <div class="card-image" style="background-image:url('https://picsum.photos/seed/tohoku-roadtrip/1200/800');"></div>
        <div class="card-body">
          <p class="card-tag">日本（Japan）</p>
          <h3 class="card-title">東北自駕之旅（Tohoku Road Trip）</h3>
          <p class="card-meta">2026年8月・8天・自駕</p>
          <p class="card-route">岩手—秋田—青森（Iwate—Akita—Aomori）</p>
          <span class="card-link">探索旅程 &rarr;</span>
        </div>
      </a>

      <div class="card card--muted">
        <div class="card-image" style="background-image:url('https://picsum.photos/seed/hokkaido-ski/800/600');"></div>
        <div class="card-body">
          <p class="card-tag">日本（Japan）</p>
          <h3 class="card-title">北海道滑雪之旅（Hokkaido Ski Trip）</h3>
          <p class="card-meta">敬請期待</p>
        </div>
      </div>

      <div class="card card--muted">
        <div class="card-image" style="background-image:url('https://picsum.photos/seed/chiangmai-slow/800/600');"></div>
        <div class="card-body">
          <p class="card-tag">泰國（Thailand）</p>
          <h3 class="card-title">清邁慢旅行（Chiang Mai Slow Travel）</h3>
          <p class="card-meta">敬請期待</p>
        </div>
      </div>

    </div>
  </section>

  <footer class="site-footer">
    <p>收藏回憶，而非物品。</p>
  </footer>

</body>
</html>
